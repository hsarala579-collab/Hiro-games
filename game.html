<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apple Catch Game</title>
</head>
<body>

<h2>Apple Catch Game</h2>
<p>Move basket: Arrow Left / Right</p>

<canvas id="game" width="400" height="500"></canvas>

<script>
var canvas = document.getElementById("game");
var ctx = canvas.getContext("2d");

// Basket (Gohan)
var basket = { x: 160, y: 450, w: 80, h: 20 };

// Apple
var apple = { x: Math.random()*350, y: 0, r: 10, speed: 3 };

var score = 0;

document.addEventListener("keydown", function(e){
    if(e.keyCode == 37) basket.x -= 20;
    if(e.keyCode == 39) basket.x += 20;

    if(basket.x < 0) basket.x = 0;
    if(basket.x > 320) basket.x = 320;
});

// Draw trees (simple shapes)
function drawTrees(){
    ctx.fillStyle = "green";
    for(var i=0;i<5;i++){
        ctx.fillRect(i*80 + 20, 80, 20, 60); // trunk
        ctx.beginPath();
        ctx.arc(i*80 + 30, 70, 25, 0, Math.PI*2);
        ctx.fill(); // leaves
    }
}

function resetApple(){
    apple.x = Math.random()*370;
    apple.y = 0;
}

function update(){

    ctx.clearRect(0,0,400,500);

    // Sky
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0,0,400,500);

    // Field
    ctx.fillStyle = "#7CFC00";
    ctx.fillRect(0,300,400,200);

    drawTrees();

    // Apple
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(apple.x, apple.y, apple.r, 0, Math.PI*2);
    ctx.fill();

    apple.y += apple.speed;

    // Basket (Gohan)
    ctx.fillStyle = "orange";
    ctx.fillRect(basket.x, basket.y, basket.w, basket.h);
    ctx.fillStyle = "black";
    ctx.fillText("GOHAN", basket.x+10, basket.y-5);

    // Catch check
    if(
        apple.y > basket.y &&
        apple.x > basket.x &&
        apple.x < basket.x + basket.w
    ){
        score++;
        resetApple();
    }

    // Miss check
    if(apple.y > 500){
        resetApple();
    }

    // Score
    ctx.fillStyle = "black";
    ctx.fillText("Score: " + score, 10, 20);

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
